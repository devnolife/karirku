<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mockup kartu pendamping karir melayang di atas meja kerja—satu layar untuk semua langkah">
  <defs>
    <linearGradient id="dk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="0.55" stop-color="#dceffb"/>
      <stop offset="1" stop-color="#cfe9fa"/>
    </linearGradient>
    <linearGradient id="dk-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7ecfb"/>
      <stop offset="1" stop-color="#bfe0f3"/>
    </linearGradient>
    <linearGradient id="dk-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0098f2"/>
    </linearGradient>
    <filter id="dk-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <clipPath id="dk-clip"><rect width="1200" height="760"/></clipPath>
  </defs>
  <g clip-path="url(#dk-clip)">
    <rect width="1200" height="760" fill="url(#dk-bg)"/>

    <!-- desk plane -->
    <path d="M0 470 C 260 430 520 470 760 452 C 980 436 1080 470 1200 456 L1200 760 L0 760 Z" fill="url(#dk-wood)"/>
    <!-- light streaks -->
    <g stroke="#ffffff" stroke-width="26" opacity="0.18" stroke-linecap="round">
      <line x1="120" y1="760" x2="320" y2="500"/>
      <line x1="300" y1="760" x2="520" y2="500"/>
      <line x1="900" y1="760" x2="1120" y2="500"/>
    </g>

    <!-- keyboard hint top-right -->
    <g opacity="0.8">
      <rect x="900" y="150" width="300" height="120" rx="14" fill="#ffffff" transform="rotate(-8 1050 210)"/>
      <g transform="rotate(-8 1050 210)" fill="#e6eef6">
        <rect x="916" y="166" width="40" height="26" rx="5"/>
        <rect x="964" y="166" width="40" height="26" rx="5"/>
        <rect x="1012" y="166" width="40" height="26" rx="5"/>
        <rect x="1060" y="166" width="40" height="26" rx="5"/>
        <rect x="1108" y="166" width="40" height="26" rx="5"/>
        <rect x="916" y="200" width="64" height="26" rx="5"/>
        <rect x="988" y="200" width="120" height="26" rx="5"/>
        <rect x="1116" y="200" width="40" height="26" rx="5" fill="#f4a36b"/>
        <rect x="940" y="234" width="190" height="22" rx="5"/>
      </g>
    </g>

    <!-- floating job-match card -->
    <g filter="url(#dk-shadow)">
      <rect x="330" y="248" width="540" height="320" rx="28" fill="#ffffff"/>
    </g>
    <g font-family="ui-sans-serif, system-ui, sans-serif">
      <text x="364" y="300" font-size="14" font-weight="600" letter-spacing="1.5" fill="#8d8d8d">JOB MATCH</text>
      <!-- row 1 -->
      <rect x="364" y="320" width="472" height="58" rx="14" fill="#f3faff"/>
      <text x="384" y="347" font-size="17" font-weight="600" fill="#0f0f0f">Junior Frontend · Xendit</text>
      <text x="384" y="368" font-size="13" fill="#8d8d8d">Rp9–12jt · remote-friendly</text>
      <text x="806" y="356" font-size="17" font-weight="700" fill="#0098f2" text-anchor="end">92%</text>
      <!-- row 2 -->
      <rect x="364" y="388" width="472" height="58" rx="14" fill="#f7fafc"/>
      <text x="384" y="415" font-size="17" font-weight="600" fill="#0f0f0f">React Dev · Vidio</text>
      <text x="384" y="436" font-size="13" fill="#8d8d8d">Rp8–11jt · hybrid</text>
      <text x="806" y="424" font-size="17" font-weight="700" fill="#6d56fc" text-anchor="end">88%</text>
      <!-- CTA -->
      <rect x="364" y="468" width="472" height="56" rx="28" fill="#0d111b"/>
      <text x="600" y="503" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Lamar dengan Karir.ai</text>
    </g>

    <!-- small accent chip top-left -->
    <g transform="rotate(-6 250 250)">
      <rect x="170" y="220" width="160" height="60" rx="16" fill="#ffffff" opacity="0.95"/>
      <circle cx="206" cy="250" r="12" fill="#0098f2"/>
      <path d="M201 250l4 4 7-8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="228" y="256" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0f0f0f">Skor cocok</text>
    </g>
  </g>
</svg>
